name: AutoRSS Feed Processor

on:
  schedule:
    - cron: '0 */2 * * *'   # Every 2 hours on the hour
  workflow_dispatch:          # Allow manual trigger from the GitHub UI

jobs:
  run-autorss:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      RSS_FEEDS:           ${{ secrets.RSS_FEEDS }}
      GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
      SCORING_CRITERIA:    ${{ secrets.SCORING_CRITERIA }}
      POSTING_THRESHOLD:   ${{ secrets.POSTING_THRESHOLD }}
      BUFFER_API_KEY:      ${{ secrets.BUFFER_API_KEY }}
      BUFFER_CHANNEL_IDS:  ${{ secrets.BUFFER_CHANNEL_IDS }}
      CALLMEBOT_PHONE:     ${{ secrets.CALLMEBOT_PHONE }}
      CALLMEBOT_API_KEY:   ${{ secrets.CALLMEBOT_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run AutoRSS script
        run: node index.js
